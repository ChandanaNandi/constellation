<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b6cf2"/>
      <stop offset="100%" style="stop-color:#3a39cb"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="45" fill="url(#grad)"/>
  <!-- Stars pattern -->
  <circle cx="30" cy="35" r="2" fill="white" opacity="0.9"/>
  <circle cx="50" cy="25" r="2.5" fill="white" opacity="1"/>
  <circle cx="70" cy="35" r="2" fill="white" opacity="0.9"/>
  <circle cx="35" cy="55" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="65" cy="55" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="50" cy="50" r="3" fill="white" opacity="1"/>
  <circle cx="40" cy="70" r="2" fill="white" opacity="0.8"/>
  <circle cx="60" cy="70" r="2" fill="white" opacity="0.8"/>
  <!-- Connecting lines -->
  <line x1="30" y1="35" x2="50" y2="25" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <line x1="50" y1="25" x2="70" y2="35" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <line x1="50" y1="50" x2="30" y2="35" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <line x1="50" y1="50" x2="70" y2="35" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <line x1="50" y1="50" x2="35" y2="55" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <line x1="50" y1="50" x2="65" y2="55" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <line x1="35" y1="55" x2="40" y2="70" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <line x1="65" y1="55" x2="60" y2="70" stroke="white" stroke-width="0.5" opacity="0.4"/>
</svg>
